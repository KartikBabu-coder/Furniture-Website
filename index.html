<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananya House of Furniture</title>
    <!-- <link rel="icon" href="icon.jfif" /> -->
    <link rel="icon" href="images/Ananya house of furntiure.png" type="image/png">

    <!-- font awesome cdn link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- swiper -->
    <link rel="stylesheet" href="https://unpkg.com/swiper@7/swiper-bundle.min.css" />
    <!-- custom css -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">

    <!-- Swiper JS -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>


</head>

<body>

    <!-- header -->

    <section class="header">

        <a href="#" class="logo"> <i class="fas fa-chair"></i> furniture</a>

        <nav class="navbar" id="navbar"></nav>

        <!-- <div class="icons">
            <div id="cart-btn" class="fas fa-nothing"></div>
            <div id="account-btn" class="fas fa-nothing"></div>
            <div id="menu-btn" class="fas fa-bars"></div>
        </div> -->
        <div class="icons">
            <div id="cart-btn" class="fas fa-shopping-cart">
                <span id="cart-count"></span>
            </div> <!-- Shopping Cart Icon -->
            <div id="account-btn" class="fas fa-user"></div> <!-- Account Icon -->
            <div id="menu-btn" class="fas fa-bars"></div>
        </div>


    </section>
    <!-- header -->

    <!-- shopping cart -->

    <div class="cart-items-container" id="cart-items">
        <div id="close" class="fas fa-times"></div>
        <a href="#" class="btn">checkout</a>
    </div>


    <!-- shopping cart -->

    <!-- account form -->

    <div class="account-form">
        <div id="close-form" class="fas fa-times"></div>

        <div class="buttons">
            <span class="btn active login-btn">login</span>
            <span class="btn register-btn">register</span>
        </div>

        <form action="" class="login-form active">
            <h3>Login now</h3>
            <input type="email" placeholder="enter your email" class="box">
            <input type="password" placeholder="enter your password" class="box">
            <div class="flex">
                <input type="checkbox" name="" id="remember-me">
                <label for="remember-me"> remember me</label>
                <a href="#">forgot password</a>
            </div>
            <input type="submit" value="login" class="btn">
        </form>

        <form action="" class="register-form">
            <h3>register now</h3>
            <input type="email" placeholder="enter your email" class="box">
            <input type="password" placeholder="enter your password" class="box">
            <input type="password" placeholder="confirm your password" class="box">
            <input type="submit" value="register" class="btn">
        </form>

    </div>

    <!-- account form -->

    <!-- home -->

    <section class="home" id="home">
        <!-- Slide Buttons -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <div class="swiper home-slider">
            <div class="swiper-wrapper" id="slider-wrapper"></div>
        </div>

    </section>

    <!-- home -->

    <!-- about us -->

    <section class="about" id="about">
        <h1 class="heading"> <span>about</span> us</h1>

        <div class="row">

            <div class="image">
                <img src="images/about.jpg" alt="">
            </div>

            <div class="content" id="about-content"></div>

        </div>

    </section>


    <!-- about us -->

    <!-- services -->

    <section class="services" id="services">

        <h1 class="heading">our <span> services</span></h1>

        <div class="box-container" id="services-container"></div>

    </section>

    <!-- services -->

    <!-- team -->

    <section class="team" id="team">

        <h1 class="heading"> our <span>team</span></h1>

        <div class="swiper team-slider">

            <div class="swiper-wrapper" id="team-wrapper"></div>

        </div>

    </section>

    <!-- team -->

    <!-- blog -->

    <section class="blog" id="blog">

        <h1 class="heading"> our <span> blogs</span></h1>

        <div class="box-container" id="blog-container"></div>

    </section>

    <!-- blog -->

    <!-- contact -->

    <section class="contact" id="contact">

        <h1 class="heading"> <span>contact</span> us</h1>

        <div class="row">

            <div class="image">
                <img src="images/contact.png" alt="">
            </div>
            <!-- https://formspree.io/f/xpwaepyo -->
            <form
                action="https://script.google.com/macros/s/AKfycbzx8c0Uz_wWEjQTKsriT6HUw2amjdnMVTJDiLQMjXhNqFNE1GALPuQepEjoSGmN5bYaSA/exec"
                method="POST">
                <h3>get in touch</h3>

                <span>Name</span>
                <input type="text" class="box" name="name" required>

                <span>Phone Number</span>
                <input type="number" class="box" name="number" required>

                <span>Email</span>
                <input type="email" class="box" name="email" required>
                <span>work type</span>
                <select class="box" id="project-type" name="project-type" required></select>
                <span>Message</span>
                <textarea class="box" name="message" cols="30" rows="10" required></textarea>

                <input type="submit" value="send message" class="btn">
            </form>


        </div>

    </section>

    <!-- contact -->

    <!-- credit -->

    <!-- <section class="credit">
        created by Ramesh Kumar | all rights reserved!
    </section> -->
    <!-- Footer Section -->
    <section class="footer">
        <div class="box-container">

            <div class="box">
                <h3>quick links</h3>
                <a href="#home"> <i class="fas fa-angle-right"></i> home</a>
                <a href="#about"> <i class="fas fa-angle-right"></i> about</a>
                <a href="#services"> <i class="fas fa-angle-right"></i> services</a>
                <a href="#product"> <i class="fas fa-angle-right"></i> products</a>
                <a href="#team"> <i class="fas fa-angle-right"></i> team</a>
                <a href="#contact"> <i class="fas fa-angle-right"></i> contact</a>
            </div>

            <div class="box" id="footer-contact"></div>

            <div class="box" id="footer-social"></div>

        </div>

        <div class="credit" id="footer-credit"></div>
    </section>




    <!-- credit -->

    <!-- Service Detail Modal -->
    <div class="service-modal" id="service-modal">
        <div class="service-modal-content" id="service-modal-content"></div>
    </div>

    <!-- Blog Detail Modal -->
    <div class="service-modal" id="blog-modal">
        <div class="service-modal-content" id="blog-modal-content"></div>
    </div>

    <!-- About Us Detail Modal -->
    <div class="service-modal" id="about-modal">
        <div class="service-modal-content about-modal-content" id="about-modal-content"></div>
    </div>

    <!-- Payment Modal -->
    <div class="service-modal" id="payment-modal">
        <div class="service-modal-content payment-modal-content" id="payment-modal-content"></div>
    </div>

    <script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>
    <!-- custom js -->
    <script src="js/script.js"></script>
</body>

</html>
